<!DOCTYPE html>
<html lang="en-us">
	<head>
		<title>Animation</title>
		<style>
			canvas { border: 1px solid black; }
		</style>
	</head>
	<body>
		<h1>Animation!?</h1>
		<canvas id="canvas" width=600 height=600></canvas>
		<script>
			
			const canvas = document.getElementById('canvas');
			const ctx = canvas.getContext('2d');

            let x1 = 0;
			let speed1 = 5;

            let x2 = 0;
			let speed2 = 9;

			let time = 0;

            function animate() {
				time = time + 1;

				
				if (time < 120) {
					x1 = x1 + speed1;
				}
				
				if (time > 120) {
					x2 = x2 + speed2;
				}

                ctx.clearRect(0,0, 600,600);

				ctx.fillStyle = 'red';
                ctx.fillRect(x1, 50, 10, 10);

				ctx.fillStyle = 'blue';
                ctx.fillRect(x2, 100, 15, 10);

                requestAnimationFrame(animate);
            }

            animate();
				
		</script>
	</body>
</html>
