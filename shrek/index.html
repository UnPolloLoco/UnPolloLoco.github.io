<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>we love shrek</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div id="introDiv">
    <img src="convexShrek.png" id="introImg">
  </div>
  <div id="introStuff">
    <div>
      <h1>Shrek Is Superior</h1>
      <button onclick="alert('wahoo')">Agreed</button>
    </div>
  </div>
  
  <div id="content">
   
  </div>
  
  <script>
    const introImg = document.getElementById('introImg');
    
    function changeIntroImg() {
      if (window.innerWidth > window.innerHeight) {
        introImg.style.width = '100vw';
        introImg.style.height = 'auto';
      } else {
        introImg.style.width = 'auto';
        introImg.style.height = '100vh';
      };
    };
    
    changeIntroImg();
    addEventListener('resize', (event) => {
      changeIntroImg();
    });
  </script>
</body>

</html>
